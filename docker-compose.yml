version: '3.8'

# ============================================
# Florient - AI短剧生成平台 Docker Compose
# 一键部署: docker-compose up -d
# ============================================

services:
  # MongoDB 数据库
  mongo:
    image: mongo:7.0
    container_name: florient-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai_drama
    volumes:
      - mongo-data:/data/db
    networks:
      - florient-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Florient 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: florient-app
    restart: unless-stopped
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: production
      PORT: 3011
      MONGODB_URI: mongodb://mongo:27017/ai_drama

      # LLM 提供商（必填，五选一: openai / anthropic / deepseek / qwen / gemini）
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}

      # Anthropic Claude
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}

      # DeepSeek
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}

      # 阿里通义千问
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-turbo}

      # Google Gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}

      # JWT 密钥（生产环境务必修改）
      JWT_SECRET: ${JWT_SECRET:-florient-jwt-secret-change-me}

      # 其他配置
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.7}
      MODEL_MAX_TOKENS: ${MODEL_MAX_TOKENS:-4000}
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-5}
      TASK_TIMEOUT: ${TASK_TIMEOUT:-300000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - ./logs:/app/logs
      - ./backend/uploads:/app/backend/uploads
    networks:
      - florient-net
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3011/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  florient-net:
    driver: bridge

volumes:
  mongo-data:
    driver: local
